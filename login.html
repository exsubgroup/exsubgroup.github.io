    <h2>Exsub Group Login</h2>
    <input id="channelHandle" placeholder="Enter your channel handle" />
    <input id="userCode" type="password" placeholder="Enter User Code" />
    <button id="loginBtn">Login</button>
    <div class="msg" id="msg"></div>
    <p style="margin-top:16px; font-size:14px; color:#374151;">
      Not a member yet? 
      <a href="https://exsubgroup.blogspot.com/p/join-exsub-group.html" style="color:#2563eb; font-weight:500; text-decoration:none;">
        Register here
      </a>

<script>
const CHECK_MEMBER_URL = "https://script.google.com/macros/s/AKfycbyXqGvViXUp7GdctXCGS_y-Mx2MnUdPAGD4EJGvaS4YaT6S9VIGZ2B_2EA6aIT11X5W/exec";
const DASHBOARD_URL = "profile.html"; // Replace with your dashboard URL

document.getElementById("loginBtn").addEventListener("click", async () => {

  const msg = document.getElementById("msg");
  const handleInput = document.getElementById("channelHandle");
  const codeInput = document.getElementById("userCode");

  let handle = handleInput.value.trim();
  let userCode = codeInput.value.trim();

  msg.textContent = "";

  if (!handle) {
    msg.textContent = "Enter channel handle";
    return;
  }

  if (!userCode) {
    msg.textContent = "Enter user code";
    return;
  }

  if (!handle.startsWith("@")) handle = "@" + handle;

  msg.textContent = "Checking login...";
  handleInput.disabled = true;
  codeInput.disabled = true;
  document.getElementById("loginBtn").disabled = true;

  try {
    const resp = await fetch(
      `${CHECK_MEMBER_URL}?handle=${encodeURIComponent(handle)}&userCode=${encodeURIComponent(userCode)}`
    );

    const data = await resp.json();

 if (!data.exists) {
  msg.textContent = "❌ Handle not found";
}
else if (!data.validUserCode) {
  msg.textContent = "❌ Wrong user code";
}
else {
  // ✅ SUCCESS LOGIN
 localStorage.setItem("channelHandle", handle);
localStorage.setItem("userCode", userCode);
localStorage.setItem("channelName", data.channelName); // ✅ ADD THIS

  // Save feature flags (your original features ✅)
  localStorage.setItem("SubscribersPromotion", data.SubscribersPromotion);
  localStorage.setItem("WatchTimePromotion", data.WatchTimePromotion);
  localStorage.setItem("ViewsLikesCommentsPromotion", data.ViewsLikesCommentsPromotion);

  window.location.href = DASHBOARD_URL;
}

  } catch (err) {
    msg.textContent = "❌ Error: " + err.message;
  } finally {
    handleInput.disabled = false;
    codeInput.disabled = false;
    document.getElementById("loginBtn").disabled = false;
  }
});

// Auto-fill saved handle (optional)
document.addEventListener("DOMContentLoaded", () => {
  const savedHandle = localStorage.getItem("channelHandle");
  const savedCode = localStorage.getItem("userCode");

  if (savedHandle) document.getElementById("channelHandle").value = savedHandle;
  if (savedCode) document.getElementById("userCode").value = savedCode;
});
</script>
