<style>

    #mobileBottomNav{
  display:none;
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  z-index:999;
  background-image: linear-gradient(180deg, #924ef4 0, #7b2af0 100%);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: white;
  border-radius:999px;
  padding:8px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,58,237,0.08);
  backdrop-filter:blur(16px);
}
#mobileBottomNav .bn-inner{ display:flex; align-items:center; gap:6px; }
#mobileBottomNav a{
  position:relative;
  width:52px; height:52px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%;
  color:#ffffff;
  transition:0.25s ease;
  text-decoration:none;
}
#mobileBottomNav a svg{
  width:22px; height:22px;
  stroke:currentColor; fill:none;
  stroke-width:2; stroke-linecap:round; stroke-linejoin:round;
  transition:0.25s ease;
}
#mobileBottomNav a:active{ transform:scale(0.92); }
#mobileBottomNav a.active{ background:#fff; color:#0f1118; }
#mobileBottomNav a.active svg{ stroke:#0f1118; }

@media (max-width: 767px){
  #mobileBottomNav{ display:block; }
  body{ padding-bottom: 90px; } /* stops content hiding behind the bar */
}


:root{
    --bg:#050508;
    --card:#12141c;
    --border:#232938;
    --purple:#7c3aed;
}

*{
    font-family:'Inter',sans-serif;
}

body{
    background:#050508;
    color:white;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,rgba(124,58,237,.18),transparent 50%);
    pointer-events:none;
}

.card{
    background:linear-gradient(180deg,#171a24,#101219);
    border:1px solid var(--border);
}

.member-card{
    background:linear-gradient(180deg,#171a24,#101219);
    border:1px solid #252938;
    border-radius:24px;
    padding:20px;
    transition:.3s;
}

.member-card:hover{
    transform:translateY(-4px);
    border-color:#7c3aed;
}

.avatar{
    width:72px;
    height:72px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(124,58,237,.4);
}

.badge{
    padding:5px 12px;
    border-radius:999px;
    font-size:12px;
    background:rgba(124,58,237,.15);
    color:#c4b5fd;
}

.pagination button{
    min-width:40px;
}
body::before{
    content:'';
    position:fixed;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:
    radial-gradient(ellipse at top center,rgba(124,58,237,0.15) 0%,transparent 40%),
    radial-gradient(ellipse at bottom,rgba(124,58,237,0.08) 0%,transparent 50%);
    z-index:0;
    pointer-events:none;
}

.glass-nav{

.text-muted{

}

.gradient-text{
    background:linear-gradient(180deg,#fff 0%,#c9cdd8 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
</style>

<main class="relative z-10 pt-32 pb-20 px-4">

<div class="max-w-[1200px] mx-auto">

        </p>

    <div class="card rounded-3xl p-6 mb-8">

        <div class="flex flex-wrap items-center justify-between gap-4">

            <div>

                <div class="text-gray-400 text-sm">
                    Total Members
                </div>

                <div
                id="memberCount"
                class="text-4xl font-black">

                </div>

            </div>

                id="pageInfo"

    id="membersContainer"
    class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">

    </div>

    class="pagination flex justify-center gap-2 mt-10 flex-wrap">

<script>

const API =
"https://script.google.com/macros/s/AKfycbxWta2prUJCHZs0fLZuCBnNgE9j5HnsnLE5ZsdWKv39lE6bMQ01YA2d9UjHVV2JJR-rnA/exec";

let currentPage = 1;

function randomAvatar(seed){

    return `https://i.pravatar.cc/150?img=${seed}`;
}

async function loadMembers(page=1){

    currentPage = page;

    document.getElementById(
        "membersContainer"
    ).innerHTML =
    `<div class="col-span-full text-center py-10">
        Loading Members...
     </div>`;

    const res =
    await fetch(
      `${API}?action=members&page=${page}`
    );

    const data =
    await res.json();

    document.getElementById(
      "memberCount"
    ).innerText =
    data.totalMembers;

    document.getElementById(
      "pageInfo"
    ).innerText =
    `${data.currentPage} / ${data.totalPages}`;

    let html = "";

    data.members.forEach((m,index)=>{

        const avatar =
        randomAvatar(
          ((page-1)*20)+index+1
        );

        html += `

        <div class="member-card">

            <div class="flex items-center gap-4">

                <img
                src="${avatar}"
                class="avatar">

                <div>

                    <h3 class="font-bold text-lg">
                        ${m.UserName || "Unknown"}
                    </h3>

                    <div class="text-gray-400 text-sm">
                        ID #${m.UserCode}
                    </div>

                </div>

            </div>

            <div class="grid grid-cols-2 gap-3 mt-5">

                <div class="card rounded-xl p-3">

                    <div class="text-gray-500 text-xs">
                        Country
                    </div>

                    <div class="font-semibold">
                        ${m.Country || "-"}
                    </div>

                </div>

                <div class="card rounded-xl p-3">

                    <div class="text-gray-500 text-xs">
                        Status
                    </div>

                    <div class="font-semibold">
                        ${m.Status || "-"}
                    </div>

                </div>

            </div>

            <div class="mt-4">

                <!-- <span class="badge">
                    WT: ${m.WTNumber || "-"}
                </span>-->

            </div>

        </div>

        `;

    });

    document.getElementById(
      "membersContainer"
    ).innerHTML = html;

    renderPagination(
      data.totalPages
    );
}

function renderPagination(totalPages){

    let html = "";

    for(let i=1;i<=totalPages;i++){

        html += `
        <button
        onclick="loadMembers(${i})"
        class="${
        i===currentPage
        ?
        'bg-purple-600'
        :
        'bg-[#171a24]'
        }
        px-4 py-2 rounded-xl border border-[#252938]">

        ${i}

        </button>
        `;
    }

    document.getElementById(
      "pagination"
    ).innerHTML = html;
}

loadMembers();

/* ================= MENUS ================= */

const mobileMenuBtn =
document.getElementById("mobileMenuBtn");

const mobileMenu =
document.getElementById("mobileMenu");

const profileBtn =
document.getElementById("profileBtn");

const profileDropdown =
document.getElementById("profileDropdown");

/* MOBILE MENU */

mobileMenuBtn.addEventListener("click",(e)=>{

    e.stopPropagation();

    mobileMenu.classList.toggle("hidden");

});

 // Close menu when clicking outside
    document.addEventListener("click", (event) => {
        const isClickInside = mobileMenu.contains(event.target) || mobileMenuBtn.contains(event.target);
        if (!isClickInside) {
            mobileMenu.classList.add("hidden");
        }
    });

/* PROFILE MENU */

profileBtn.addEventListener("click",(e)=>{

    e.stopPropagation();

    profileDropdown.classList.toggle("hidden");

});

/* CLOSE MENUS */

document.addEventListener("click",()=>{

    mobileMenu.classList.add("hidden");

    profileDropdown.classList.add("hidden");

});




</script>
