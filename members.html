<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Members – Exsub Group</title>
<link rel="icon" href="images/logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="navbar.css">
<link rel="stylesheet" href="style.css">

<style>
/* =========================================================
   MEMBERS.HTML — namespaced `mem-` styles only.
   Follows the same neo-brutalist tokens used across the app:
   bg #F5F4EB · ink #211F1F · mint #ACD1C0 · sand #DBD4B7
========================================================= */

.mem-toolbar{
  display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
  gap:12px; margin-bottom:22px;
}
.mem-search-wrap{
  position:relative; flex:1; min-width:220px; max-width:360px;
}
.mem-search-input{
  width:100%; box-sizing:border-box;
  padding:0 16px 0 40px; height:42px;
  font-family:system-ui,-apple-system,sans-serif; font-size:13px; font-weight:600;
  background:#fff; color:#211F1F;
  border:2px solid #211F1F; border-radius:16px;
  box-shadow:4px 4px 0px 0px #211F1F;
  outline:none;
}
.mem-search-input::placeholder{ color:#8a8578; font-weight:500; }
.mem-search-icon{
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:14px; pointer-events:none;
}

.mem-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(min(260px,100%),1fr));
  gap:18px;
}

.mem-card{
  background:#fff;
  border:2px solid #211F1F;
  border-radius:20px;
  box-shadow:4px 4px 0px 0px #211F1F;
  padding:18px;
  transition:transform .15s ease, box-shadow .15s ease;
}
.mem-card:hover{
  transform:translate(-2px,-2px);
  box-shadow:6px 6px 0px 0px #211F1F;
}

.mem-card-head{ display:flex; align-items:flex-start; gap:12px; }
.mem-avatar-ring{
  width:58px; height:58px; border-radius:50%;
  border:2px solid #211F1F; flex-shrink:0;
  overflow:hidden; background:#F5F4EB;
  display:flex; align-items:center; justify-content:center;
}
.mem-avatar-ring img{ width:100%; height:100%; object-fit:cover; display:block; }

.mem-name{ font-weight:800; font-size:15px; color:#211F1F; line-height:1.25; overflow-wrap:anywhere; }
.mem-code{
  font-family:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  font-size:11px; color:#6b7280; margin-top:2px;
}

.mem-status-pill{
  margin-left:auto; flex-shrink:0;
  padding:0.2rem 0.6rem; border-radius:9999px;
  font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.03em;
  border:1px solid #211F1F; white-space:nowrap;
}
.mem-status-active   { background:#ACD1C0; color:#211F1F; }
.mem-status-blocked  { background:#ef4444; color:#fff; }
.mem-status-pending  { background:#fbbf24; color:#211F1F; }
.mem-status-default  { background:#DBD4B7; color:#211F1F; }

.mem-stats{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
.mem-stat-box{
  background:#F5F4EB; border:2px solid #211F1F; border-radius:14px;
  padding:8px 10px;
}
.mem-stat-label{
  font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:.04em;
  color:#6b7280; margin-bottom:2px;
}
.mem-stat-value{
  font-size:12.5px; font-weight:700; color:#211F1F;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.mem-groups-row{
  display:flex; flex-wrap:wrap; gap:6px; margin-top:12px;
}
.mem-group-chip{
  font-size:10px; font-weight:700;
  padding:3px 9px; border-radius:999px;
  background:#211F1F; color:#DBD4B7;
  border:1px solid #211F1F;
}
.mem-group-chip.mem-chip-off{
  background:#fff; color:#b8b2a1; border-color:#d8d3c4;
}

.mem-empty{
  grid-column:1 / -1;
  text-align:center; padding:64px 24px;
  border:2px dashed #211F1F; border-radius:20px;
}

.mem-pagination{ display:flex; justify-content:center; gap:8px; margin-top:32px; flex-wrap:wrap; }
.mem-page-btn{
  min-width:40px; height:40px; padding:0 12px;
  font-weight:800; font-size:13px;
  background:#fff; color:#211F1F;
  border:2px solid #211F1F; border-radius:12px;
  box-shadow:3px 3px 0px 0px #211F1F;
  cursor:pointer; transition:transform .12s ease, box-shadow .12s ease;
}
.mem-page-btn:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0px 0px #211F1F; }
.mem-page-btn.mem-page-active{ background:#211F1F; color:#F5F4EB; }
/* For mobile screens */

.mem-stat-value {
  font-size: 12.5px;
  font-weight: 700;
  color: #211F1F;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: block;
}

.mem-stat-box {
  background: #F5F4EB;
  border: 2px solid #211F1F;
  border-radius: 14px;
  padding: 8px 10px;
  min-width: 0; /* Prevents flex overflow */
  overflow: hidden;
}

@media (max-width: 480px) {
  .mem-stat-value {
    font-size: 10px;
    white-space: normal;
    word-break: break-word;
  }
  
  .mem-stats {
    gap: 6px;
  }
  
  .mem-stat-box {
    padding: 6px 8px;
  }
}

</style>

</head>
<body>

<div id="navbar-root"></div>
<script src="navbar.js"></script>

<!-- ══════════════════ MAIN ══════════════════ -->
<main class="page-content relative z-10 pb-5 px-4">
<main class="relative z-10 pt-5 pb-5 px-4">
<div class="max-w-[1200px] mx-auto">

  <!-- LOADING -->
  <div id="loadingState" class="flex flex-col items-center justify-center py-32 gap-5">
    <div class="spinner"></div>
    <div class="text-gray-400 text-sm">Loading members…</div>
  </div>

  <!-- ERROR -->
  <div id="errorState" class="hidden text-center py-32">
    <div class="text-5xl mb-4">⚠️</div>
    <div class="text-xl font-bold mb-2">Could not load members</div>
    <div id="errorMsg" class="text-gray-400 text-sm mb-6"></div>
    <button onclick="loadMembers(currentPage)"
      class="btn-retro btn-charcoal">Retry</button>
  </div>

  <!-- CONTENT -->
  <div id="dashContent" class="hidden">

    <!-- ── HEADER ── -->
    <div class="nb-dashboard-header">
      <div class="nb-badge-container">
        <div class="nb-status-card nb-status-static">
          <span class="nb-card-title">Members Directory</span>
        </div>
        <div class="nb-status-card">
          <span class="nb-card-icon">👥</span>
          <span class="nb-card-title">Total</span>
          <span id="memberCount" class="nb-pill nb-pill-warning" style="background:#ACD1C0;">0</span>
        </div>
        <div class="nb-status-card">
          <span class="nb-card-icon">📄</span>
          <span class="nb-card-title">Page</span>
          <span id="pageInfo" class="nb-pill nb-pill-warning" style="background:#DBD4B7;">1 / 1</span>
        </div>
      </div>

      <h1 class="text-3xl sm:text-4xl font-black text-[#211F1F]">Community Members</h1>
      <div class="text-gray-400 text-sm mt-1">Browse everyone registered on Exsub Group</div>
    </div>


<!-- ── STATS SECTION ── -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
  <div class="card p-4 text-center bg-white border-2 border-[#211F1F] rounded-2xl shadow-[3px_3px_0px_0px_#211F1F]">
    <div class="text-lg mb-1">👥</div>
    <div class="text-xs text-gray-500 font-bold uppercase">Subscribers Work</div>
    <div id="statSubsWork" class="text-xl font-black text-[#211F1F]">0</div>
  </div>
  <div class="card p-4 text-center bg-white border-2 border-[#211F1F] rounded-2xl shadow-[3px_3px_0px_0px_#211F1F]">
    <div class="text-lg mb-1">🎬</div>
    <div class="text-xs text-gray-500 font-bold uppercase">Video Task</div>
    <div id="statVideoWork" class="text-xl font-black text-[#211F1F]">0</div>
  </div>
  <div class="card p-4 text-center bg-white border-2 border-[#211F1F] rounded-2xl shadow-[3px_3px_0px_0px_#211F1F]">
    <div class="text-lg mb-1">⏱️</div>
    <div class="text-xs text-gray-500 font-bold uppercase">Watchtime</div>
    <div id="statWatchtimeWork" class="text-xl font-black text-[#211F1F]">0</div>
  </div>
  <div class="card p-4 text-center bg-white border-2 border-[#211F1F] rounded-2xl shadow-[3px_3px_0px_0px_#211F1F]">
    <div class="text-lg mb-1">💬</div>
    <div class="text-xs text-gray-500 font-bold uppercase">Like & Comment</div>
    <div id="statEngageWork" class="text-xl font-black text-[#211F1F]">0</div>
  </div>
</div>

<!-- ── COUNTRY STATS ── -->
<div class="card p-5 mb-6 bg-white border-2 border-[#211F1F] rounded-2xl shadow-[3px_3px_0px_0px_#211F1F]">
  <h3 class="text-sm font-black uppercase tracking-wider text-[#211F1F] mb-3">🌍 Members by Country</h3>
  <div id="countryStats" class="flex flex-wrap gap-2">
    <span class="text-gray-400 text-sm">Loading...</span>
  </div>
</div>


    <!-- ── TOOLBAR ── -->
    <div class="mem-toolbar">
      <div class="mem-search-wrap">
        <span class="mem-search-icon">🔍</span>
        <input id="memSearchInput" class="mem-search-input" type="text"
          placeholder="Search this page by name, code, country…" oninput="filterVisibleMembers()">
      </div>
    </div>

    <!-- ── GRID ── -->
    <div id="membersContainer" class="mem-grid"></div>

    <!-- ── PAGINATION ── -->
    <div id="pagination" class="mem-pagination"></div>

  </div><!-- /dashContent -->

</div>
</main>
</main>
<script>
'use strict';

/* ── CONFIG ── */
var API = "https://script.google.com/macros/s/AKfycbza0jX4KurePOdMQ26zfEi1R9BTawQXEGEKp05lwhzyz4lFV1PaxROvTFFZ5CLQjuo8lQ/exec";

/* ── SESSION ── */
var usercode = (localStorage.getItem("usercode") || "").trim().toUpperCase();
var username = localStorage.getItem("username") || "";
if (!usercode || !username) { window.location.replace("signin.html"); }

var currentPage = 1;
var lastMembers = [];

var DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/1384/1384060.png";

/* ══════════════════ LOAD ══════════════════ */
async function loadMembers(page) {
  page = page || 1;
  currentPage = page;
  show("loadingState"); hide("errorState"); hide("dashContent");

  try {
    var res = await fetch(API + "?action=members&page=" + page);
    var data = await res.json();
    if (!data.success) throw new Error(data.message || "Failed to load members");

    lastMembers = data.members || [];

    setText("memberCount", fmt(data.totalMembers));
    setText("pageInfo", data.currentPage + " / " + data.totalPages);

    renderMembers(lastMembers);
    renderStats(data.stats); // 👈 ADD THIS LINE
    renderPagination(data.totalPages, data.currentPage);

    hide("loadingState"); show("dashContent");
  } catch (err) {
    hide("loadingState"); show("errorState");
    setText("errorMsg", err.message || "Network error. Please try again.");
  }
}
/* ══════════════════ RENDER MEMBERS ══════════════════ */
function statusPillClass(status) {
  var s = (status || "").toLowerCase();
  if (s === "active")  return "mem-status-active";
  if (s === "blocked") return "mem-status-blocked";
  if (s === "pending") return "mem-status-pending";
  return "mem-status-default";
}

function groupChips(m) {
  var groups = [
    { on: m.InSubscribersWork === "Yes",    label: "👥 Subs" },
    { on: m.InVideoTaskWork === "Yes",      label: "🎬 Video" },
    { on: m.InWatchtimeWork === "Yes",      label: "⏱ Watchtime" },
    { on: m.InLikeAndCommentWork === "Yes", label: "💬 Engage" }
  ];
  return groups.map(function(g){
    return '<span class="mem-group-chip' + (g.on ? '' : ' mem-chip-off') + '">' + g.label + '</span>';
  }).join("");
}

function memberCardHTML(m) {
  var avatar = (m.ProfilePicture && String(m.ProfilePicture).trim()) ? m.ProfilePicture : DEFAULT_AVATAR;
  var status = m.Status || "—";

  return '<div class="mem-card" data-search="' +
      ((m.UserName||"") + " " + (m.UserCode||"") + " " + (m.Country||"")).toLowerCase().replace(/"/g,"") +
    '">' +
    '<div class="mem-card-head">' +
      '<div class="mem-avatar-ring"><img src="' + avatar + '" onerror="this.src=\'' + DEFAULT_AVATAR + '\'"></div>' +
      '<div class="min-w-0">' +
        '<div class="mem-name">' + (m.UserName || "Unknown") + '</div>' +
        '<div class="mem-code">#' + (m.UserCode || "—") + '</div>' +
      '</div>' +
      '<span class="mem-status-pill ' + statusPillClass(status) + '">' + status + '</span>' +
    '</div>' +
    '<div class="mem-stats">' +
      '<div class="mem-stat-box">' +
        '<div class="mem-stat-label">Country</div>' +
        '<div class="mem-stat-value">' + (m.Country || "—") + '</div>' +
      '</div>' +
      '<div class="mem-stat-box">' +
        '<div class="mem-stat-label">Joined</div>' +
        '<div class="mem-stat-value">' + fmtDate(m.DateOfJoin) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="mem-groups-row">' + groupChips(m) + '</div>' +
  '</div>';
}

function renderMembers(members) {
  var container = document.getElementById("membersContainer");
  if (!container) return;
  document.getElementById("memSearchInput").value = "";

  if (!members || members.length === 0) {
    container.innerHTML = '<div class="mem-empty">' +
      '<div class="text-5xl mb-4">📭</div>' +
      '<div class="text-xl font-bold mb-2">No members found</div>' +
      '<div class="text-gray-400 text-sm">Try a different page.</div>' +
    '</div>';
    return;
  }

  container.innerHTML = members.map(memberCardHTML).join("");
}

/* ══════════════════ RENDER STATS ══════════════════ */
function renderStats(stats) {
  if (!stats) return;
  
  // Work type counts
  setText("statSubsWork", fmt(stats.inSubscribersWork || 0));
  setText("statVideoWork", fmt(stats.inVideoTaskWork || 0));
  setText("statWatchtimeWork", fmt(stats.inWatchtimeWork || 0));
  setText("statEngageWork", fmt(stats.inLikeAndCommentWork || 0));
  
  // Country stats
  renderCountryStats(stats.countries || {});
}

function renderCountryStats(countries) {
  const container = document.getElementById("countryStats");
  if (!container) return;
  
  const entries = Object.entries(countries);
  
  if (entries.length === 0) {
    container.innerHTML = '<span class="text-gray-400 text-sm">No country data available</span>';
    return;
  }
  
  // Show top 10 countries
  const topCountries = entries.slice(0, 10);
  
  container.innerHTML = topCountries.map(([country, count]) => {
    return `<span class="inline-flex items-center gap-2 px-3 py-1.5 bg-[#F5F4EB] border-2 border-[#211F1F] rounded-full text-sm font-bold text-[#211F1F]">
      <span>${country}</span>
      <span class="bg-[#211F1F] text-[#F5F4EB] px-2 py-0.5 rounded-full text-xs">${count}</span>
    </span>`;
  }).join("");
  
  // Show total countries count
  if (entries.length > 10) {
    container.innerHTML += `<span class="inline-flex items-center px-3 py-1.5 bg-[#DBD4B7] border-2 border-[#211F1F] rounded-full text-sm font-bold text-[#211F1F]">
      +${entries.length - 10} more
    </span>`;
  }
}


/* Client-side filter across the currently loaded page of members */
function filterVisibleMembers() {
  var q = (document.getElementById("memSearchInput").value || "").toLowerCase().trim();
  document.querySelectorAll("#membersContainer .mem-card").forEach(function(card){
    var hay = card.getAttribute("data-search") || "";
    card.style.display = (!q || hay.indexOf(q) !== -1) ? "" : "none";
  });
}

/* ══════════════════ PAGINATION ══════════════════ */
function renderPagination(totalPages, current) {
  var el = document.getElementById("pagination");
  if (!el) return;
  if (!totalPages || totalPages <= 1) { el.innerHTML = ""; return; }

  var html = "";
  for (var i = 1; i <= totalPages; i++) {
    html += '<button class="mem-page-btn' + (i === current ? ' mem-page-active' : '') +
      '" onclick="loadMembers(' + i + ')">' + i + '</button>';
  }
  el.innerHTML = html;
}

/* ══════════════════ DOM HELPERS ══════════════════ */
function show(id) { var el = document.getElementById(id); if (el) { el.classList.remove("hidden"); if (el.style.display === "none") el.style.display = ""; } }
function hide(id) { var el = document.getElementById(id); if (el) el.classList.add("hidden"); }
function setText(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; }
function fmt(n) { var num = parseFloat(n); return isNaN(num) ? "0" : num.toLocaleString(); }
function fmtDate(d) {
  if (!d) return "—";
  var dt = new Date(d);
  if (isNaN(dt.getTime())) return String(d);
  return dt.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" });
}

/* ══════════════════ LOGOUT ══════════════════ */
function logoutUser() {
  if (!confirm("Are you sure you want to logout?")) return;
  localStorage.clear(); sessionStorage.clear();
  window.location.replace("signin.html");
}

/* ── KICK OFF ── */
loadMembers(1);
</script>

<script>
(function(){
  const current = window.location.pathname.split("/").pop() || "index.html";
  document.querySelectorAll("#mobileBottomNav a").forEach(a => {
    if (a.getAttribute("data-page") === current) a.classList.add("active");
  });
})();
</script>

</body>
</html>
