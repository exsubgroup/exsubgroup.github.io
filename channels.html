<script>
/* =========================================================
   CONFIG
========================================================= */
const ChannelCRUDScript = "https://script.google.com/macros/s/AKfycbxyWaLI5KD9O-imw_i_pD3htxWW-MlPsvE2eXX8Le2jGiMZ85t7R5zlYEF0h9bSY7mddw/exec";

/* =========================================================
   SESSION — load directly from what login already saved.
========================================================= */
const savedUsername = localStorage.getItem("username") || "";
const savedPassword = localStorage.getItem("password") || "";
const savedUserCode = localStorage.getItem("usercode") || "";

if (!savedUsername || !savedPassword) {
  window.location.href = "signin.html";
}

/* =========================================================
   STATE
========================================================= */
let promoChannelId  = null;     // store the promo channel's YouTube channelId

/* =========================================================

========================================================= */
const CHANNEL_TYPES = [

  { id:'unboxing',               emoji:'📦', label:'Unboxing' },
  { id:'diy_crafts',             emoji:'✂️', label:'DIY & Crafts' },
  { id:'home_decor',             emoji:'🏠', label:'Home Decor' },
  { id:'parenting',              emoji:'👶', label:'Parenting' },

  { id:'history',                emoji:'🏛️', label:'History' },
  { id:'science_experiments',    emoji:'🧪', label:'Science Experiments' },
  { id:'tech_reviews',           emoji:'📱', label:'Technology Reviews' },
  { id:'programming',            emoji:'💻', label:'Programming' },
  { id:'ai_automation',          emoji:'🤖', label:'AI & Automation' },
  { id:'travel_vlogs',           emoji:'🧳', label:'Travel Vlogs' },

  { id:'minimalism',             emoji:'🍃', label:'Minimalism' },

  { id:'dance',                  emoji:'💃', label:'Dance' },
  { id:'film_reviews',           emoji:'🎞️', label:'Film Reviews' },
  { id:'book_reviews',           emoji:'📖', label:'Book Reviews' },
  { id:'documentary',            emoji:'📽️', label:'Documentary Style' },
  { id:'spirituality',           emoji:'🕊️', label:'Spirituality' },
  { id:'motorsports',            emoji:'🏁', label:'Motorsports' },
  { id:'wildlife',               emoji:'🦁', label:'Wildlife' },
  { id:'charity',                emoji:'🤲', label:'Charity' },
  { id:'islamic',                emoji:'🕌', label:'Islamic' },
  { id:'discovery',              emoji:'🔎', label:'Discovery Videos' },
  { id:'informative',            emoji:'ℹ️', label:'Informative Videos' },
  { id:'shocking',                emoji:'😱', label:'Shocking Videos' },
  { id:'shocking_informative',    emoji:'😲', label:'Shocking & Informative Videos' },

];

/* =========================================================
   FORMAT HELPERS
========================================================= */
/** Turns raw sheet timestamps (ISO strings like 2026-04-06T19:43:00.000Z,
 * or already-formatted dd/MM/yyyy HH:mm strings) into a clean, readable
 * local date/time for display. Falls back to the raw value if it can't parse. */
function formatNiceDate(raw) {
  if (!raw || raw === '-' ) return '-';
  const d = new Date(raw);
  if (isNaN(d.getTime())) return raw; // already a plain string like "not update yet"
  return d.toLocaleDateString(undefined, { day:'2-digit', month:'short', year:'numeric' })
    + ' · ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' });
}

/* =========================================================
   TYPE GRID HTML
========================================================= */
/**
 * Renders a searchable channel-type picker. `selectedValue` can be
 * either a known type id (e.g. "gaming") or a free-text custom
 * value previously saved via the "Other" option — either way it's
 * highlighted/pre-filled correctly.
 */
function typeSelectorHTML(selectedValue = '') {
  const isKnown  = CHANNEL_TYPES.some(t => t.id === selectedValue);
  const isCustom = selectedValue && !isKnown;
  const activeId = isKnown ? selectedValue : (isCustom ? 'other' : '');
  const customVal = isCustom ? selectedValue : '';

  return `
    <div class="promochannel-type-search-wrap">
      <input type="text" id="typeSearchInput" class="promochannel-type-search" placeholder="Search channel type…" oninput="filterTypeGrid()" autocomplete="off">
    </div>
    <div class="promochannel-type-grid" id="typeGrid">
      ${CHANNEL_TYPES.map(t =>
        `<div class="promochannel-type-opt${t.id === activeId ? ' promochannel-type-opt--selected' : ''}" onclick="selectType('${t.id}')" data-type="${t.id}" data-label="${t.label.toLowerCase()}">
          <span class="promochannel-type-emoji">${t.emoji}</span>${t.label}
        </div>`
      ).join('')}
    </div>
    <input type="hidden" id="selectedChannelType" value="${activeId}">
    <div id="customTypeWrap" class="promochannel-type-custom-wrap" style="${activeId === 'other' ? '' : 'display:none;'}">
      <label class="promochannel-field-label">Type your channel category</label>
      <input type="text" id="customTypeInput" class="promochannel-field-input" placeholder="e.g. Vintage Cars, Anime Reviews…" value="${customVal.replace(/"/g,'&quot;')}">
      <p class="promochannel-type-hint">Can't find your category? Type it here — our team reviews custom types and may add them officially.</p>
    </div>
  `;
}

function selectType(id) {
  document.querySelectorAll('.promochannel-type-opt').forEach(el => {
    el.classList.toggle('promochannel-type-opt--selected', el.dataset.type === id);
  });
  const hidden = document.getElementById('selectedChannelType');
  if (hidden) hidden.value = id;
  const customWrap = document.getElementById('customTypeWrap');
  if (customWrap) customWrap.style.display = id === 'other' ? 'block' : 'none';
}

function filterTypeGrid() {
  const q = (document.getElementById('typeSearchInput')?.value || '').toLowerCase().trim();
  document.querySelectorAll('#typeGrid .promochannel-type-opt').forEach(el => {
    el.style.display = (!q || el.dataset.label.includes(q)) ? '' : 'none';
  });
}

/** Reads the final channel type value out of the selector — either
 * the chosen type's id, or the free-text "Other" value the member typed. */
function getSelectedChannelTypeValue() {
  const sel = document.getElementById('selectedChannelType');
  if (!sel) return '';
  if (sel.value === 'other') {
    const custom = document.getElementById('customTypeInput');
    return custom ? custom.value.trim() : '';
  }
  return sel.value;
}

/* =========================================================
   LOAD CHANNEL
   Goes straight to ChannelCRUDScript using saved username/
   password — no separate login/status round-trip first.
   validateMember() inside the Apps Script still confirms the
   credentials are correct before returning any data.
========================================================= */
async function loadChannels() {
  try {
    let promoChannels = [];
    const pr = await fetch(ChannelCRUDScript
      + `?action=getMyChannel`
      + `&username=${encodeURIComponent(savedUsername)}`
      + `&password=${encodeURIComponent(savedPassword)}`
    );
    const pd = await pr.json();

    if (pd.status !== 'success') {
      hideLoading();
      await Swal.fire({
        icon: "error",
        title: "Session Expired",
        text: pd.message || "Please sign in again.",
        confirmButtonText: "Go to Sign In"
      });
      localStorage.clear();
      window.location.href = "signin.html";
      return;
    }

    // Extract promo channels safely
    promoChannels = Array.isArray(pd.channels) ? pd.channels : [];
    if (promoChannels.length > 0) promoChannelId = promoChannels[0].ChannelId;

    renderPromo(promoChannels);
    hideLoading();

  } catch(err) {
    hideLoading();
    Swal.fire({ icon:"error", title:"Error", text:"Unable to load promotional data: " + err.message });
  }
}
function hideLoading() {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.add('hide');
  setTimeout(() => overlay.style.display = 'none', 500);
}

/* =========================================================
   RENDER PROMO
========================================================= */
function renderPromo(channels) {
  const container = document.getElementById('promoContainer');
  const badge     = document.getElementById('promoLimitBadge');
  const btn       = document.getElementById('btnAddPromo');

  if (channels.length >= 1) {
    badge.className = 'promochannel-badge promochannel-badge--full';
    badge.innerHTML = '<span class="promochannel-badge-dot"></span>1/1 Slot Used';
    btn.disabled = true;
    btn.classList.add('promochannel-btn-add--disabled');
    btn.onclick = null;
  } else {
    badge.className = 'promochannel-badge promochannel-badge--ok';
    badge.innerHTML = '<span class="promochannel-badge-dot"></span>Slot Available';
  }

  container.innerHTML = channels.length === 0
    ? emptyState('📢','No Promotional Channel','Add your channel to start receiving community support')
    : channels.map(ch => channelCardHTML(ch)).join('');
}

/* =========================================================
   CHANNEL CARD HTML
========================================================= */
function emptyState(icon, title, desc) {
  return `<div class="promochannel-empty">
    <div class="promochannel-empty-icon">${icon}</div>
    <h2 class="promochannel-empty-title">${title}</h2>
    <p class="promochannel-empty-desc">${desc}</p>
  </div>`;
}

function channelCardHTML(ch) {
  const image    = ch.ChannelImage && ch.ChannelImage.trim()
    ? ch.ChannelImage
    : "https://cdn-icons-png.flaticon.com/512/1384/1384060.png";
  const typeObj  = CHANNEL_TYPES.find(t => t.id === (ch.ChannelType||'').toLowerCase()) || { emoji:'🌐', label: ch.ChannelType||'-' };
  const lastUpdated = formatNiceDate(ch.LastUpdated||'-');
  const isLive   = String(ch.VideosReady||'').toLowerCase() === 'yes';

  // Issue box only shows when there's an actual reported issue (not blank / "No")
  const issueText = (ch.Issue || '').trim();
  const hasIssue  = issueText && issueText.toLowerCase() !== 'no';
  const issueBoxHTML = hasIssue
    ? `<div class="promochannel-notice promochannel-notice--danger">
         <span class="promochannel-notice-label">⚠️ Issue</span>
         <strong class="promochannel-notice-text">${issueText}</strong>
       </div>`
    : '';

  // Surface a clear "videos not added yet" notice when not ready
  const videosNotReadyHTML = !isLive
    ? `<div class="promochannel-notice promochannel-notice--warning">
         ⚠️ Videos are not added yet. You need to add videos to start work in our group.
       </div>`
    : '';

  const editFn   = `openEditModal('${ch.ChannelId}')`;
  const ytFn     = `updateChannelYT('${ch.ChannelId}')`;
  const changeFn = `openChangeChannelModal('${ch.ChannelId}')`;

  return `<div class="promochannel-card">
    <div class="promochannel-card-media">
      <div class="promochannel-avatar-ring${isLive ? ' promochannel-avatar-ring--live' : ''}">
        <img src="${image}" class="promochannel-avatar" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1384/1384060.png'">
      </div>
    </div>
    <div class="promochannel-card-body">
     
      <h2 class="promochannel-name">${ch.ChannelName||'Unknown Channel'}</h2>
      <div class="promochannel-handle">${ch.ChannelHandle||'channel'}</div>

      <div class="promochannel-stats">
        <div class="promochannel-stat">
          <span class="promochannel-stat-label">Channel Type</span>
          <strong class="promochannel-stat-value">${typeObj.emoji} ${typeObj.label}</strong>
        </div>
        <div class="promochannel-stat">
          <span class="promochannel-stat-label">Subscribers</span>
          <strong class="promochannel-stat-value promochannel-stat-value--mono">${ch.TotalSubscribers||0}</strong>
        </div>
        <div class="promochannel-stat">
          <span class="promochannel-stat-label">Last Updated</span>
          <strong class="promochannel-stat-value promochannel-stat-value--mono">${lastUpdated}</strong>
        </div>
      </div>

      ${issueBoxHTML}
      ${videosNotReadyHTML}

      <a href="${ch.ChannelLink||'#'}" target="_blank" class="promochannel-visit-link">
        Visit Channel <span class="promochannel-visit-arrow">→</span>
      </a>
    </div>
    <div class="promochannel-actions">
      <button onclick="${editFn}" class="btn-retro btn-charcoal">✏️ Edit Channel</button>
      <button onclick="${ytFn}" class="btn-retro btn-sand">🔄 Sync from YouTube</button>
      <button onclick="${changeFn}" class="btn-retro btn-mint">🔁 Change Channel</button>
    </div>
  </div>`;
}

/* =========================================================
   ADD CHANNEL MODAL (Promotional Channel only)
========================================================= */
function openAddModal() {
  Swal.fire({
    title: '📢 Add Promotional Channel',
    width:600,
    html:`<div style="text-align:left">
      <label class="promochannel-field-label">YouTube Channel Link</label>
      <input id="sw_channelLink" class="promochannel-field-input" placeholder="https://youtube.com/@yourchannel">
      <label class="promochannel-field-label">Channel Type</label>${typeSelectorHTML()}
    </div>`,
    confirmButtonText: 'Add Promotional Channel',
    showCancelButton:true,
    cancelButtonText:'Cancel',
    preConfirm: async () => {
      const channelLink = document.getElementById('sw_channelLink').value.trim();
      const channelType = getSelectedChannelTypeValue();
      const isCustomType = document.getElementById('selectedChannelType')?.value === 'other';
      if (!channelLink) { Swal.showValidationMessage('Please enter a channel link'); return false; }
      if (!channelType) { Swal.showValidationMessage('Please select or type a channel type'); return false; }
      try {
        Swal.showLoading();
        const r = await fetch(ChannelCRUDScript
          + `?action=addChannel`
          + `&username=${encodeURIComponent(savedUsername)}`
          + `&password=${encodeURIComponent(savedPassword)}`
          + `&channelLink=${encodeURIComponent(channelLink)}`
          + `&channelType=${encodeURIComponent(channelType)}`
          + (isCustomType ? `&isCustomType=yes` : '')
        );
        const d = await r.json();
        if (d.status !== 'success') { Swal.showValidationMessage(d.message); return false; }
        return d;
      } catch(e) { Swal.showValidationMessage('Something went wrong. Try again.'); return false; }
    }
  }).then(result => {
    if (result.isConfirmed) {
      Swal.fire({
        icon:'success',
        title:'Success!',
        text: 'Promotional Channel added. Relevant issues cleared.',
        timer:1800,
        showConfirmButton:false
      });
      setTimeout(() => location.reload(), 1900);
    }
  });
}

/* =========================================================
   EDIT CHANNEL MODAL (Promotional Channel only)
========================================================= */
async function openEditModal(channelId) {
  let ch = null;
  try {
    const r = await fetch(ChannelCRUDScript
      + `?action=getChannel`
      + `&username=${encodeURIComponent(savedUsername)}`
      + `&password=${encodeURIComponent(savedPassword)}`
      + `&channelId=${encodeURIComponent(channelId)}`
    );
    const d = await r.json();
    if (d.status === 'success') ch = d.channel;
  } catch(e) {}

  const currType = ch ? (ch.ChannelType||'') : '';
  const currName = ch ? (ch.ChannelName||'') : '';

  Swal.fire({
    title:'✏️ Edit Channel', width:620,
    html:`<div style="text-align:left">
      <label class="promochannel-field-label">Channel Name (from YouTube — not editable)</label>
      <input id="sw_editName" class="promochannel-field-input promochannel-field-input--disabled" value="${currName}" disabled>
      <label class="promochannel-field-label">Channel Type</label>${typeSelectorHTML(currType)}
      <div class="promochannel-modal-info">
        💡 The channel name always reflects your real YouTube name. Use <strong>Save Changes</strong> to update the type shown here, or <strong>Sync YouTube</strong> to re-fetch live data (name, subscribers, image, etc). To switch to an entirely different channel, use <strong>🔁 Change Channel</strong> on the card instead.
      </div>
    </div>`,
    showConfirmButton:true, showDenyButton:true, showCancelButton:true,
    confirmButtonText:'💾 Save Changes',
    denyButtonText:'🔄 Sync YouTube',
    cancelButtonText:'Cancel',
    preConfirm: async () => {
      const ctype = getSelectedChannelTypeValue();
      const isCustomType = document.getElementById('selectedChannelType')?.value === 'other';
      try {
        Swal.showLoading();
        const r = await fetch(ChannelCRUDScript
          + `?action=editChannel`
          + `&username=${encodeURIComponent(savedUsername)}`
          + `&password=${encodeURIComponent(savedPassword)}`
          + `&channelId=${encodeURIComponent(channelId)}`
          + `&channelType=${encodeURIComponent(ctype)}`
          + (isCustomType ? `&isCustomType=yes` : '')
        );
        const d = await r.json();
        if (d.status !== 'success') { Swal.showValidationMessage(d.message); return false; }
        return { action:'save' };
      } catch(e) { Swal.showValidationMessage('Something went wrong'); return false; }
    }
  }).then(async result => {
    if (result.isConfirmed) {
      Swal.fire({ icon:'success', title:'Changes Saved!', timer:1400, showConfirmButton:false });
      setTimeout(() => location.reload(), 1500);
    } else if (result.isDenied) {
      Swal.fire({ title:'Syncing from YouTube…', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });
      try {
        const r = await fetch(ChannelCRUDScript
          + `?action=updateChannel`
          + `&username=${encodeURIComponent(savedUsername)}`
          + `&password=${encodeURIComponent(savedPassword)}`
          + `&channelId=${encodeURIComponent(channelId)}`
        );
        const d = await r.json();
        if (d.status === 'deleted') {
          Swal.fire({
            icon:'error',
            title:'Channel Deleted on YouTube!',
            text: d.message,
            confirmButtonText:'🔁 Change Channel Now',
            confirmButtonColor:'#f59e0b',
            showCancelButton:true,
            cancelButtonText:'Later'
          }).then(res => {
            if (res.isConfirmed) openChangeChannelModal(channelId);
            else location.reload();
          });
          return;
        }
        if (d.status !== 'success') { Swal.fire({ icon:'error', title:'Sync Failed', text:d.message }); return; }
        Swal.fire({ icon:'success', title:'Synced!', timer:1400, showConfirmButton:false });
        setTimeout(() => location.reload(), 1500);
      } catch(e) { Swal.fire({ icon:'error', title:'Error', text:'Unable to sync' }); }
    }
  });
}

/* =========================================================
   QUICK SYNC FROM CARD
   If YouTube reports the channel no longer exists, the backend
   returns status:"deleted" — surface a clear alert and offer to
   jump straight into the Change Channel flow.
========================================================= */
async function updateChannelYT(channelId) {
  Swal.fire({ title:'Syncing from YouTube…', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });
  try {
    const r = await fetch(ChannelCRUDScript
      + `?action=updateChannel`
      + `&username=${encodeURIComponent(savedUsername)}`
      + `&password=${encodeURIComponent(savedPassword)}`
      + `&channelId=${encodeURIComponent(channelId)}`
    );
    const d = await r.json();
    if (d.status === 'deleted') {
      Swal.fire({
        icon:'error',
        title:'Channel Deleted on YouTube!',
        text: d.message,
        confirmButtonText:'🔁 Change Channel Now',
        confirmButtonColor:'#f59e0b',
        showCancelButton:true,
        cancelButtonText:'Later'
      }).then(res => {
        if (res.isConfirmed) openChangeChannelModal(channelId);
        else location.reload();
      });
      return;
    }
    if (d.status !== 'success') { Swal.fire({ icon:'error', title:'Failed', text:d.message }); return; }
    Swal.fire({ icon:'success', title:'Synced!', timer:1400, showConfirmButton:false });
    setTimeout(() => location.reload(), 1500);
  } catch(e) { Swal.fire({ icon:'error', title:'Error', text:'Unable to sync' }); }
}

/* =========================================================
   CHANGE PROMOTIONAL CHANNEL
   Cascades and removes every old video row plus any playlist data
   (the backend handles this and auto-imports videos from the new
   channel).
========================================================= */
function openChangeChannelModal(channelId) {
  const warningHTML = `<div class="promochannel-modal-warning">
        ⚠️ <strong>Important:</strong> Changing your promotional channel permanently deletes all videos and any playlist linked to your current channel. Videos from the new channel are imported automatically.
      </div>`;

  Swal.fire({
    title:'🔁 Change Promotional Channel', width:600,
    html:`<div style="text-align:left">
      <label class="promochannel-field-label">New YouTube Channel Link</label>
      <input id="sw_newChannelLink" class="promochannel-field-input" placeholder="https://youtube.com/@newchannel">
      ${warningHTML}
    </div>`,
    confirmButtonText:'🔁 Change Channel',
    confirmButtonColor:'#f59e0b',
    showCancelButton:true,
    cancelButtonText:'Cancel',
    preConfirm: async () => {
      const link = document.getElementById('sw_newChannelLink').value.trim();
      if (!link) { Swal.showValidationMessage('Please enter the new channel link'); return false; }
      try {
        Swal.showLoading();
        const r = await fetch(ChannelCRUDScript
          + `?action=changeChannel`
          + `&username=${encodeURIComponent(savedUsername)}`
          + `&password=${encodeURIComponent(savedPassword)}`
          + `&channelLink=${encodeURIComponent(link)}`
        );
        const d = await r.json();
        if (d.status !== 'success') { Swal.showValidationMessage(d.message); return false; }
        return d;
      } catch(e) { Swal.showValidationMessage('Something went wrong. Try again.'); return false; }
    }
  }).then(result => {
    if (result.isConfirmed) {
      Swal.fire({ icon:'success', title:'Channel Changed!', text: result.value.message || '', timer:2600, showConfirmButton:false });
      setTimeout(() => location.reload(), 2700);
    }
  });
}

/* =========================================================
   LOGOUT
========================================================= */
function logoutUser() {
  if (!confirm("Are you sure you want to logout?")) return;
  localStorage.clear(); sessionStorage.clear();
  window.location.replace("signin.html");
}
