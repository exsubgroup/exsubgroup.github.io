<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="icon" href="images/logo.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
    --bg:#050508;
    --card:#12141c;
    --border:#1e212c;
    --purple:#7c3aed;
    --purple2:#8b5cf6;
    --text-muted:#8a8f9e;
}

*{
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:white;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:
    radial-gradient(ellipse at top center,rgba(124,58,237,0.15) 0%,transparent 40%),
    radial-gradient(ellipse at bottom,rgba(124,58,237,0.08) 0%,transparent 50%);
    z-index:0;
    pointer-events:none;
}

.glass-nav{
    background-image:linear-gradient(180deg,#924ef4 0,#7b2af0 100%);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.06);
    color:white;
}

.card{
    background:linear-gradient(180deg,#151821 0%,#101219 100%);
    border:1px solid var(--border);
    box-shadow:0 1px 0 rgba(255,255,255,0.03) inset;
}

.text-muted{
    color:var(--text-muted);
}

.gradient-text{
    background:linear-gradient(180deg,#fff 0%,#c9cdd8 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.input-box{
    width:100%;
    background:#0f1118;
    border:1px solid #232632;
    border-radius:16px;
    padding:15px 18px;
    color:white;
    outline:none;
    transition:0.3s ease;
    font-size:14px;
}

.input-box:focus{
    border-color:#7c3aed;
    box-shadow:0 0 0 4px rgba(124,58,237,0.15);
}

.label{
    display:block;
    margin-bottom:10px;
    font-size:14px;
    font-weight:600;
}

.save-btn{
    background:linear-gradient(180deg,#8b5cf6 0%,#7c3aed 100%);
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:16px;
    font-weight:700;
    transition:0.3s ease;
}

.save-btn:hover{
    transform:translateY(-2px);
}

.profile-image{
    width:120px;
    height:120px;
    border-radius:30px;
    object-fit:cover;
    border:3px solid rgba(124,58,237,0.5);
}

.upload-btn{
    background:#171a24;
    border:1px solid #2a2e3d;
    padding:10px 18px;
    border-radius:14px;
    font-size:13px;
    transition:0.3s ease;
}

.upload-btn:hover{
    border-color:#7c3aed;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="fixed top-3 left-1/2 -translate-x-1/2 w-[calc(100%-1.5rem)] max-w-[1200px] z-50">

    <div class="glass-nav rounded-2xl px-4 sm:px-6 py-3 flex items-center justify-between">

        <!-- LOGO -->

        <div class="flex items-center gap-2">

            <img
            src="images/logo.svg"
            class="w-7 h-7">

            <span class="font-semibold text-[17px]">
                Exsub Group
            </span>

        </div>

        <!-- NAVIGATION -->

        <div class="hidden md:flex items-center gap-8 text-[13px]">

            <a href="profile.html" class="text-purple-200 font-semibold">
                Profile
            </a>

            <a href="groups.html" class="text-white hover:text-purple-300 transition">
                Groups
            </a>

            <a href="#" class="text-white hover:text-purple-300 transition">
                Tasks
            </a>

            <a href="#" class="text-white hover:text-purple-300 transition">
                Support
            </a>

        </div>

        <!-- USER -->

        <div class="flex items-center gap-3">

            <img
            src="https://i.pravatar.cc/100"
            class="w-10 h-10 rounded-full border border-white/10">

            <div class="hidden sm:block">

                <div class="text-sm font-semibold">
                    Mazhar
                </div>

                <div class="text-[11px] text-purple-100">
                    Member
                </div>

            </div>

        </div>

    </div>

</nav>

<!-- MAIN -->

<main class="relative z-10 pt-32 pb-20 px-4">

    <div class="max-w-[900px] mx-auto">

        <!-- HEADER -->

        <div class="text-center mb-10">

            <div class="inline-flex items-center gap-2 bg-purple-500/10 border border-purple-500/20 text-purple-300 px-5 py-2 rounded-full text-sm mb-5">

                👤 Member Profile

            </div>

            <h1 class="text-4xl md:text-5xl font-black gradient-text">

                Edit Your Profile

            </h1>

            <p class="text-muted mt-5 max-w-[650px] mx-auto leading-7">

                Update your personal information, profile image and account details.

            </p>

        </div>

        <!-- PROFILE CARD -->

        <div class="card rounded-[32px] p-6 md:p-8">

            <!-- PROFILE TOP -->

            <div class="flex flex-col md:flex-row items-center gap-8 pb-8 border-b border-[#232632]">

                <div class="relative">

                    <img
                    id="profilePreview"
                    src="https://i.pravatar.cc/200"
                    class="profile-image">

                </div>

                <div class="flex-1">

                    <h2 class="text-3xl font-bold">
                        Mazhar Saleem
                    </h2>

                    <p class="text-muted mt-2">
                        EXSUB Member ID : #EX24571
                    </p>

                    <div class="flex flex-wrap gap-3 mt-5">

                        <button class="upload-btn">
                            Upload Photo
                        </button>

                        <button class="upload-btn">
                            Remove Photo
                        </button>

                    </div>

                </div>

            </div>

            <!-- FORM -->

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">

                <!-- USERNAME -->

                <div>

                    <label class="label">
                        Full Name
                    </label>

                    <input
                    type="text"
                    class="input-box"
                    value="Mazhar Saleem"
                    placeholder="Enter your full name">

                </div>

                <!-- USERNAME -->

                <div>

                    <label class="label">
                        Username
                    </label>

                    <input
                    type="text"
                    class="input-box"
                    value="mazhar"
                    placeholder="Enter username">

                </div>

                <!-- EMAIL -->

                <div>

                    <label class="label">
                        Email Address
                    </label>

                    <input
                    type="email"
                    class="input-box"
                    value="mazhar@gmail.com"
                    placeholder="Enter email address">

                </div>

                <!-- PHONE -->

                <div>

                    <label class="label">
                        Phone Number
                    </label>

                    <input
                    type="text"
                    class="input-box"
                    value="+92 300 0000000"
                    placeholder="Enter phone number">

                </div>

                <!-- COUNTRY -->

                <div>

                    <label class="label">
                        Country
                    </label>

                    <input
                    type="text"
                    class="input-box"
                    value="Pakistan"
                    placeholder="Enter country">

                </div>

                <!-- JOIN DATE -->

                <div>

                    <label class="label">
                        Join Date
                    </label>

                    <input
                    type="text"
                    class="input-box"
                    value="25 May 2026"
                    disabled>

                </div>

            </div>

            <!-- BIO -->

            <div class="mt-6">

                <label class="label">
                    Bio
                </label>

                <textarea
                class="input-box min-h-[140px] resize-none"
                placeholder="Write about yourself...">YouTube creator focused on growing channels, engagement and community support.</textarea>

            </div>

            <!-- PASSWORD SECTION -->

            <div class="mt-10">

                <h2 class="text-2xl font-bold mb-6">
                    Change Password
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>

                        <label class="label">
                            Current Password
                        </label>

                        <input
                        type="password"
                        class="input-box"
                        placeholder="Current password">

                    </div>

                    <div>

                        <label class="label">
                            New Password
                        </label>

                        <input
                        type="password"
                        class="input-box"
                        placeholder="New password">

                    </div>

                </div>

            </div>

            <!-- BUTTONS -->

            <div class="flex flex-wrap gap-4 mt-10">

                <button class="save-btn">
                    Save Changes
                </button>

                <button class="upload-btn">
                    Cancel
                </button>

            </div>

        </div>

    </div>

</main>

<!-- FOOTER -->

<footer class="relative z-10 border-t border-[#1e212c]">

    <div class="max-w-[1200px] mx-auto px-4 py-8 flex flex-col md:flex-row justify-between gap-4">

        <div>

            <div class="flex items-center gap-2">

                <img src="images/logo.svg" class="w-6 h-6">

                <span class="font-semibold">
                    Exsub Group
                </span>

            </div>

            <p class="text-muted text-sm mt-3">
                Grow together with creators worldwide.
            </p>

        </div>

        <div class="flex gap-6 text-sm text-muted">

            <a href="#" class="hover:text-white transition">
                Privacy
            </a>

            <a href="#" class="hover:text-white transition">
                Terms
            </a>

            <a href="#" class="hover:text-white transition">
                Support
            </a>

        </div>

    </div>

</footer>

</body>
</html>
