.ygm-urgent{background:#fce5cd;color:#9c3f00;}
.ygm-rejected{background:#f8d7da;color:#721c24;}

.ygm-btn{padding:6px 12px;border:none;border-radius:20px;color:#fff;cursor:pointer;font-size:12px;}

<!-- HERO SECTION -->
<div class="container my-2"  style=" background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 10px;
    margin: 10px auto;">

<div class="ygm-wrapper">
<div class="ygm-card">

<h3 class="ygm-title">Video Watching Work</h3>

<div class="ygm-search">
<input type="text" id="handleInput" class="ygm-input" placeholder="Enter Channel Handle">
<br>
<button id="getBtn" class="ygm-btn-main" onclick="loadWork()">Get My Tasks</button>
  <button id="getBtn" class="ygm-btn-main" style="background:#ffac63"><a href="https://exsubgroup.blogspot.com/p/my-video-watch-working-proof.html"style="Color:white;">My Activities</a></button>
</div>
  
  <h4 class="ygm-title">Click any task category and start work</h4>
  
<div class="ygm-counter-row">
  
   <div class="ygm-counter" onclick="filterTasks('Urgent', this)">
    <span>Urgent</span>
    <strong id="urgent">0</strong>
  </div>

  <div class="ygm-counter" onclick="filterTasks('Rejected', this)">
    <span>Rejected</span>
    <strong id="rejected">0</strong>
  </div>
  
  <div class="ygm-counter" onclick="filterTasks('Pending', this)">
    <span>New</span>
    <strong id="pending">0</strong>
  </div>

  <div class="ygm-counter" onclick="filterTasks('Watched', this)">
    <span>Watched</span>
    <strong id="watched">0</strong>
  </div>

 

  <div class="ygm-counter" onclick="filterTasks('All', this)">
    <span>All</span>
    <strong id="all">0</strong>
  </div>
</div>

<div id="taskBody" class="ygm-task-grid"></div>

</div>
</div>

<div id="consolePanel"></div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxoKgKSxeBiLdfU7mf8o90tYvLv_HZtilIE9H7OPCp9TnWpeyZb4Gr-kpPdxwI-vE0/exec";

let allTasks=[];
let currentFilter="All";

function log(msg){
  const panel=document.getElementById("consolePanel");
  panel.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  panel.scrollTop=panel.scrollHeight;
}

  function formatDate(isoDate){
    if(!isoDate) return "No Data";
    const date = new Date(isoDate);
    return date.toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
  
window.addEventListener("load",()=>{
  const saved=localStorage.getItem("channelHandle");
  if(saved){
    document.getElementById("handleInput").value=saved;
    loadWork();
  }
});

function loadWork(){

  const handle=document.getElementById("handleInput").value.trim();
  if(!handle){ alert("Enter handle"); return; }

  localStorage.setItem("channelHandle",handle);

  const btn=document.getElementById("getBtn");
  btn.innerText="Please wait...";
  btn.disabled=true;

  log("Fetching tasks for: "+handle);

  fetch(`${SCRIPT_URL}?handle=${encodeURIComponent(handle)}`)
  .then(res=>res.json())
  .then(data=>{
    allTasks=data||[];
    updateCounters();
    displayTasks(currentFilter);
  })
  .catch(err=>{
    log("ERROR: "+err);
    alert("Error loading tasks");
  })
  .finally(()=>{
    btn.innerText="Get My Tasks";
    btn.disabled=false;
  });
}

// ----------------- UPDATE COUNTERS -----------------
function updateCounters(){

  let pending=0,watched=0,urgent=0,rejected=0;

  allTasks.forEach(row=>{
    if(row.WorkStatus==="Pending") pending++;
    if(row.WorkStatus==="Watched") watched++;
    if(row.WorkStatus==="Urgent") urgent++;
    if(row.WorkStatus==="Rejected") rejected++;
  });

  document.getElementById("pending").innerText=pending;
  document.getElementById("watched").innerText=watched;
  document.getElementById("urgent").innerText=urgent;
  document.getElementById("rejected").innerText=rejected;
  document.getElementById("all").innerText=allTasks.length;
}

// ----------------- FILTER TASKS -----------------
function filterTasks(status, el){
  currentFilter = status;
  // remove active from all
  document.querySelectorAll(".ygm-counter").forEach(c=>c.classList.remove("active"));
  if(el) el.classList.add("active");
  displayTasks(status);
}

// ----------------- DISPLAY TASKS -----------------
function displayTasks(status){

  const container=document.getElementById("taskBody");
  container.innerHTML="";

  allTasks.forEach(row=>{

    if(status!=="All" && row.WorkStatus!==status) return;

    let badgeClass=
      row.WorkStatus==="Pending"?"ygm-badge ygm-pending":
      row.WorkStatus==="Watched"?"ygm-badge ygm-watched":
      row.WorkStatus==="Urgent"?"ygm-badge ygm-urgent":
      row.WorkStatus==="Rejected"?"ygm-badge ygm-rejected":
      "ygm-badge ygm-pending";

    let submitBtn = row.WorkStatus==="Watched"
      ? `<button class="ygm-btn btn-done">Done</button>`
      : `<button class="ygm-btn btn-submit" onclick="markDone('${row.WorkId}', this)">Submit Task</button>`;

    const searchQuery = encodeURIComponent(
      (row.VideoTitle || '') + " " + (row.WorkWithChannelName || '')
    );

    const searchUrl = `https://www.youtube.com/results?search_query=${searchQuery}`;

    const card=document.createElement("div");
    card.className="ygm-task-card";

    card.innerHTML=`
      <img src="${row.WorkWithImage || 'https://via.placeholder.com/80'}"
           style="width:100px;height:100px;border-radius:50%;object-fit:cover;">
           <strong>${row.WorkWithChannelName || '-'}</strong>
      <img src="${row.VideoThumbnail || 'https://via.placeholder.com/260x140'}"
           style="width:100%;border-radius:10px;">
      <strong>${row.VideoTitle || '-'}</strong>
      <small>Duration ${row.VideoMinutes || '-'} Minutes</small>
       <small>${formatDate(row.CreatedDate) || '-'}</small>
      <span class="${badgeClass}">${row.WorkStatus==="Pending"?"New Task":row.WorkStatus}</span>
      <button class="ygm-btn btn-video" onclick="window.open('${searchUrl}')">🔍 Search & Watch</button>
      <button class="ygm-btn btn-channel" onclick="window.open('https://www.youtube.com/${row.WorkWithHandle}')">📺 Open Channel</button>
      ${submitBtn}
    `;

    container.appendChild(card);
  });
}

// ----------------- MARK DONE -----------------
function markDone(id,btn){
  btn.innerText="Please wait...";
  btn.disabled=true;

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({action:"markDone",WorkId:id})
  })
  .then(res=>res.json())
  .then(resp=>{
    if(resp.success){
      loadWork();
    }else{
      throw new Error("Update failed");
    }
  })
  .catch(err=>{
    log("Submit error: "+err);
    alert("Failed");
    btn.disabled=false;
    btn.innerText="Submit Task";
  });
}

</script>
