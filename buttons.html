<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Retro Buttons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="button-container">
        <!-- Charcoal Buttons (#211F1F) -->
        <div class="button-group">
            <h3>Charcoal (#211F1F)</h3>
            <button class="btn-retro btn-charcoal">Short</button>
            <button class="btn-retro btn-charcoal">This is a much longer dynamic button</button>
        </div>

        <!-- Sand Buttons (#DBD4B7) -->
        <div class="button-group">
            <h3>Sand (#DBD4B7)</h3>
            <button class="btn-retro btn-sand">Short</button>
            <button class="btn-retro btn-sand">Automatically resizing based on text length</button>
        </div>

        <!-- Mint Buttons (#ACD1C0) -->
        <div class="button-group">
            <h3>Mint (#ACD1C0)</h3>
            <button class="btn-retro btn-mint">Short</button>
            <button class="btn-retro btn-mint">Click here to submit the dynamic form</button>
        </div>
    </div>

</body>
</html>
