<!-- HERO SECTION -->
<div class="container my-2"  style=" background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 10px;
    margin: 10px auto;">

<div class="wrapper">

<div class="card">

<h3 class="title">Watchtime Tasks</h3>

<div class="search">
<input type="text" id="handleInput" class="input" placeholder="Enter Channel Handle">
<br>
<button class="btn" onclick="loadTasks()">Load Tasks</button>
</div>

<div class="counter-row">
<div class="counter" onclick="filterTasks('Pending')">Pending <strong id="pending">0</strong></div>
<div class="counter" onclick="filterTasks('Watched')">Watched <strong id="watched">0</strong></div>
<div class="counter" onclick="filterTasks('All')">All <strong id="all">0</strong></div>
</div>

<div class="grid" id="taskBody"></div>

<div class="log-box" id="logBox">Logs will appear here...</div>

</div>
</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx35vN-Dy7U5Yf8p7ClexZYpuIQn4H_mSsgQYXGBL-OvLVrh2NDoruQQ43MzaiuzDkY/exec";

let allTasks=[];


// LOG
function log(msg){
const lb=document.getElementById("logBox");
lb.innerHTML+=`[${new Date().toLocaleTimeString()}] ${msg}<br>`;
lb.scrollTop=lb.scrollHeight;
}


// AUTO LOAD HANDLE
window.addEventListener("load",()=>{
const savedHandle=localStorage.getItem("channelHandle");

if(savedHandle){
document.getElementById("handleInput").value=savedHandle;
log(`Saved handle found: ${savedHandle}`);
loadTasks();
}

});


// LOAD TASKS
function loadTasks(){

const handle=document.getElementById("handleInput").value.trim();

if(!handle){
alert("Enter Channel Handle");
return;
}

localStorage.setItem("channelHandle",handle);

log(`Fetching tasks for handle: ${handle}`);

fetch(`${SCRIPT_URL}?handle=${encodeURIComponent(handle)}`)
.then(res=>res.json())
.then(data=>{

allTasks=data;

log(`Tasks received: ${allTasks.length}`);

renderCounters();

displayTasks("All");

})
.catch(err=>{

log("Error loading tasks: "+err);

alert("Error loading tasks. Check logs.");

});

}


// COUNTERS
function renderCounters(){

let pending=0;
let watched=0;

allTasks.forEach(task=>{

if(task.WorkStatus==="Watched") watched++;
else pending++;

});

document.getElementById("pending").innerText=pending;
document.getElementById("watched").innerText=watched;
document.getElementById("all").innerText=allTasks.length;

}


// FILTER
function filterTasks(status){
displayTasks(status);
}


// DISPLAY
function displayTasks(status){

const container=document.getElementById("taskBody");

container.innerHTML="";

allTasks.forEach(task=>{

if(status!=="All" && task.WorkStatus!==status) return;

const badgeClass=task.WorkStatus==="Watched"
? "badge watched"
: "badge pending";

const playlistUrl="https://www.youtube.com/playlist?list="+task.playlistid;

const card=document.createElement("div");

card.className="playlist-card";

card.innerHTML=`

<img class="channel-img" src="${task.channelimage}" />

<div class="channel-name">${task.WorkWithUserCodeChannelHandle}</div>

<div><b>Playlist:</b> ${task.playlistname}</div>

<div class="duration">Duration: ${task.playlistduration}</div>

<span class="${badgeClass}">${task.WorkStatus}</span>

<br>

<button class="open-btn"
onclick="window.open('${playlistUrl}','_blank')">
Open Playlist
</button>

`;

container.appendChild(card);

});

}

</script>
